/* Logo flottant (IDENTIQUE à A propos) */
.logo-floating{
  position:fixed;

  right:20px;

  padding:10px 28px;

}

.logo-floating img{

}

/* Bouton retour en haut */
.scroll-btn{
  position:fixed;
  bottom:20px;
  left:20px;
  z-index:9999;
  background:white;
  border:none;
  padding:10px;
  border-radius:50%;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
  cursor:pointer;
}

/* Galerie */
.gallery{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
  padding:20px;
}

.card{
  position:relative;
  border-radius:15px;
  overflow:hidden;
}

.card img{
  width:250px;
  height:350px;
  object-fit:cover;
  border-radius:15px;
}

/* effet hover */
.card:hover{
  transform:scale(1.05);
  transition:0.3s;
}

</style>
